<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Select an insurance company, TPA, and network to download the corresponding provider network list."
    >

    <title>Provider Network List</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <main class="container">


        <!-- =====================================================
             HEADER
        ====================================================== -->

        <header class="page-header">

            <h1>
                Provider Network List
            </h1>

            <p class="description">
                Select your insurance company, TPA, and network
                to download the corresponding provider list.
            </p>

        </header>



        <!-- =====================================================
             RESPONSIVE SELECTION GRID
        ====================================================== -->

        <section class="selection-grid">


            <!-- =================================================
                 INSURANCE COMPANY
            ================================================== -->

            <div class="form-group">

                <label for="companyButton">
                    Insurance Company
                </label>


                <div
                    class="custom-dropdown"
                    id="companyDropdown"
                >


                    <button
                        type="button"
                        class="dropdown-button"
                        id="companyButton"
                        aria-haspopup="listbox"
                        aria-expanded="false"
                    >

                        <span>
                            Select insurance company
                        </span>

                        <span
                            class="arrow"
                            aria-hidden="true"
                        >
                            ⌄
                        </span>

                    </button>



                    <div
                        class="dropdown-menu"
                        role="listbox"
                    >


                        <div class="dropdown-search-box">

                            <span
                                class="search-icon"
                                aria-hidden="true"
                            >
                                ⌕
                            </span>


                            <input
                                type="text"
                                id="companySearch"
                                placeholder="Search insurance company..."
                                autocomplete="off"
                                aria-label="Search insurance companies"
                            >

                        </div>



                        <div
                            class="dropdown-options"
                            id="companyOptions"
                        >
                        </div>


                    </div>

                </div>

            </div>



            <!-- =================================================
                 TPA
            ================================================== -->

            <div class="form-group">

                <label for="tpaButton">
                    TPA
                </label>


                <div
                    class="custom-dropdown"
                    id="tpaDropdown"
                >


                    <button
                        type="button"
                        class="dropdown-button"
                        id="tpaButton"
                        aria-haspopup="listbox"
                        aria-expanded="false"
                    >

                        <span>
                            Select TPA
                        </span>

                        <span
                            class="arrow"
                            aria-hidden="true"
                        >
                            ⌄
                        </span>

                    </button>



                    <div
                        class="dropdown-menu"
                        role="listbox"
                    >


                        <div class="dropdown-search-box">

                            <span
                                class="search-icon"
                                aria-hidden="true"
                            >
                                ⌕
                            </span>


                            <input
                                type="text"
                                id="tpaSearch"
                                placeholder="Search TPA..."
                                autocomplete="off"
                                aria-label="Search TPAs"
                            >

                        </div>



                        <div
                            class="dropdown-options"
                            id="tpaOptions"
                        >
                        </div>


                    </div>

                </div>

            </div>



            <!-- =================================================
                 INSURANCE NETWORK
            ================================================== -->

            <div class="form-group">

                <label for="networkButton">
                    Insurance Network
                </label>


                <div
                    class="custom-dropdown"
                    id="networkDropdown"
                >


                    <button
                        type="button"
                        class="dropdown-button"
                        id="networkButton"
                        aria-haspopup="listbox"
                        aria-expanded="false"
                    >

                        <span>
                            Select network
                        </span>

                        <span
                            class="arrow"
                            aria-hidden="true"
                        >
                            ⌄
                        </span>

                    </button>



                    <div
                        class="dropdown-menu"
                        role="listbox"
                    >


                        <div class="dropdown-search-box">

                            <span
                                class="search-icon"
                                aria-hidden="true"
                            >
                                ⌕
                            </span>


                            <input
                                type="text"
                                id="networkSearch"
                                placeholder="Search network..."
                                autocomplete="off"
                                aria-label="Search insurance networks"
                            >

                        </div>



                        <div
                            class="dropdown-options"
                            id="networkOptions"
                        >
                        </div>


                    </div>

                </div>

            </div>


        </section>



        <!-- =====================================================
             SELECTED INFORMATION
        ====================================================== -->

        <div
            class="selected-info"
            id="selectedInfo"
        >


            <p>

                <strong>
                    Company:
                </strong>

                <span id="selectedCompany">
                    -
                </span>

            </p>



            <p>

                <strong>
                    TPA:
                </strong>

                <span id="selectedTpa">
                    -
                </span>

            </p>



            <p>

                <strong>
                    Network:
                </strong>

                <span id="selectedNetwork">
                    -
                </span>

            </p>


        </div>



        <!-- =====================================================
             DOWNLOAD BUTTON
        ====================================================== -->

        <button
            type="button"
            id="downloadButton"
            class="download-button"
            disabled
        >

            Download Network File

        </button>



        <!-- =====================================================
             STATUS MESSAGE
        ====================================================== -->

        <p
            id="message"
            role="status"
            aria-live="polite"
        >
        </p>


    </main>



    <!-- =====================================================
         JAVASCRIPT
    ====================================================== -->

    <script src="script.js"></script>


</body>

</html>
