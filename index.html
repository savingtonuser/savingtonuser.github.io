<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Download insurance provider network lists."
    >

    <title>Provider Network List</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <main class="container">


        <!-- =====================================
             HEADER
        ====================================== -->

        <header class="page-header">

            <h1>Provider Network List</h1>

            <p class="description">
                Select your insurance company and network to download
                the corresponding provider list.
            </p>

        </header>



        <!-- =====================================
             INSURANCE COMPANY DROPDOWN
        ====================================== -->

        <div class="form-group">

            <label for="companyButton">
                Insurance Company
            </label>


            <div
                class="custom-dropdown"
                id="companyDropdown"
            >


                <!-- Dropdown Button -->

                <button
                    type="button"
                    class="dropdown-button"
                    id="companyButton"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                >

                    <span>
                        Select insurance company
                    </span>

                    <span
                        class="arrow"
                        aria-hidden="true"
                    >
                        ⌄
                    </span>

                </button>



                <!-- Dropdown Menu -->

                <div
                    class="dropdown-menu"
                    role="listbox"
                >


                    <!-- Search -->

                    <div class="dropdown-search-box">

                        <span
                            class="search-icon"
                            aria-hidden="true"
                        >
                            ⌕
                        </span>


                        <input
                            type="text"
                            id="companySearch"
                            placeholder="Search insurance company..."
                            autocomplete="off"
                            aria-label="Search insurance companies"
                        >

                    </div>



                    <!-- Company Options -->

                    <div
                        class="dropdown-options"
                        id="companyOptions"
                    >
                    </div>


                </div>

            </div>

        </div>
        <!-- TPA -->

<div class="form-group">
    <label>TPA</label>

    <div class="custom-dropdown" id="tpaDropdown">

        <button
            type="button"
            class="dropdown-button"
            id="tpaButton"
        >
            <span>Select TPA</span>
            <span class="arrow">⌄</span>
        </button>

        <div class="dropdown-menu">

            <div class="dropdown-search-box">

                <span class="search-icon">⌕</span>

                <input
                    type="text"
                    id="tpaSearch"
                    placeholder="Search TPA..."
                    autocomplete="off"
                >

            </div>

            <div
                class="dropdown-options"
                id="tpaOptions"
            ></div>

        </div>

    </div>
</div>



        <!-- =====================================
             INSURANCE NETWORK DROPDOWN
        ====================================== -->

        <div class="form-group">

            <label for="networkButton">
                Insurance Network
            </label>


            <div
                class="custom-dropdown"
                id="networkDropdown"
            >


                <!-- Dropdown Button -->

                <button
                    type="button"
                    class="dropdown-button"
                    id="networkButton"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                >

                    <span>
                        Select network
                    </span>

                    <span
                        class="arrow"
                        aria-hidden="true"
                    >
                        ⌄
                    </span>

                </button>



                <!-- Dropdown Menu -->

                <div
                    class="dropdown-menu"
                    role="listbox"
                >


                    <!-- Search -->

                    <div class="dropdown-search-box">

                        <span
                            class="search-icon"
                            aria-hidden="true"
                        >
                            ⌕
                        </span>


                        <input
                            type="text"
                            id="networkSearch"
                            placeholder="Search network..."
                            autocomplete="off"
                            aria-label="Search insurance networks"
                        >

                    </div>



                    <!-- Network Options -->

                    <div
                        class="dropdown-options"
                        id="networkOptions"
                    >
                    </div>


                </div>

            </div>

        </div>



        <!-- =====================================
             SELECTED INFORMATION
        ====================================== -->
<div
    class="selected-info"
    id="selectedInfo"
>

    <p>
        <strong>Company:</strong>

        <span id="selectedCompany">
            -
        </span>
    </p>


    <p>
        <strong>TPA:</strong>

        <span id="selectedTpa">
            -
        </span>
    </p>


    <p>
        <strong>Network:</strong>

        <span id="selectedNetwork">
            -
        </span>
    </p>

</div>


        <!-- =====================================
             DOWNLOAD BUTTON
        ====================================== -->

        <button
            type="button"
            id="downloadButton"
            class="download-button"
            disabled
        >

            Download Network File

        </button>



        <!-- =====================================
             STATUS MESSAGE
        ====================================== -->

        <p
            id="message"
            role="status"
            aria-live="polite"
        >
        </p>


    </main>



    <!-- External JavaScript -->

    <script src="script.js"></script>

</body>

</html>
